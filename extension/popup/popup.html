<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom Workflow Recorder</title>
  <link rel="stylesheet" href="../prism-tokens.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="header">
      <div>
        <div class="brand">Zoom Workflow Recorder</div>
        <div id="status-text" class="subtle">Checking status...</div>
      </div>
      <label class="switch" title="Enable or disable recorder capture">
        <input id="extension-enabled" type="checkbox">
        <span class="switch-track" aria-hidden="true"></span>
        <span class="sr-only">Enable extension</span>
      </label>
    </header>

    <section class="panel">
      <div class="status-row">
        <span id="enabled-pill" class="pill">Enabled</span>
        <span id="recording-pill" class="pill neutral">Idle</span>
      </div>
      <button id="btn-open-panel" class="button primary" type="button">Open Side Panel</button>
    </section>

    <section class="panel">
      <div class="section-heading">
        <div>
          <h2>Web UI</h2>
          <p id="server-url" class="subtle">localhost:4174</p>
        </div>
        <span id="connection-pill" class="pill neutral">Unknown</span>
      </div>
      <div class="button-row">
        <button id="btn-check-connection" class="button secondary" type="button">Check Connection</button>
        <button id="btn-open-web-ui" class="button secondary" type="button">Open Web UI</button>
      </div>
      <p id="connection-message" class="message" role="status"></p>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
